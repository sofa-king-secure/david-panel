<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIR // RADAR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1920px; height:440px; overflow:hidden; background:#000; }

  #radar-header {
    position:fixed; top:0; left:0; right:0; height:24px;
    background:#000; display:flex; align-items:center;
    padding:0 16px; z-index:10; border-bottom:1px solid #0f2a0f;
  }
  .hleft  { color:#00ff41; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; width:960px; }
  .hright { color:#00ccff; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; width:960px; padding-left:16px; border-left:1px solid #1a3a1a; }
  .hhint  { color:#334433; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px; margin-left:auto; }

  #divider { position:fixed; top:24px; left:960px; width:2px; height:416px; background:#1a3a1a; z-index:10; }

  #pane-us, #pane-mi {
    position:absolute; top:24px; height:416px; width:960px; overflow:hidden;
  }
  #pane-us { left:0; }
  #pane-mi { left:962px; }

  #pane-us iframe, #pane-mi iframe {
    width:100%; height:100%; border:none;
  }
</style>
</head>
<body>

  <div id="radar-header">
    <span class="hleft">◈ US · NEXRAD COMPOSITE</span>
    <span class="hright">◈ MI · REGIONAL · NEXRAD</span>
    <span class="hhint">SPACE / → RETURN TO HUD</span>
  </div>
  <div id="divider"></div>

  <!-- LEFT: US national Windy — loads immediately -->
  <div id="pane-us">
    <iframe id="iframe-us"
      src="https://embed.windy.com/embed2.html?lat=39.5&lon=-96&detailLat=39.5&detailLon=-96&width=960&height=416&zoom=4&level=surface&overlay=radar&product=radar&menu=&message=&marker=&calendar=12&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1"
      allowfullscreen>
    </iframe>
  </div>

  <!-- RIGHT: MI zoomed Windy — src injected after delay so Windy loads both -->
  <div id="pane-mi">
    <iframe id="iframe-mi" allowfullscreen></iframe>
  </div>

<script>
  // Inject the second Windy embed after the first has had time to fully init
  setTimeout(() => {
    document.getElementById('iframe-mi').src =
      'https://embed.windy.com/embed2.html?lat=43.0&lon=-85.5&detailLat=43.0&detailLon=-85.5&width=960&height=416&zoom=6&level=surface&overlay=radar&product=radar&menu=&message=&marker=&calendar=12&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1';
  }, 3000);
</script>

</body>
</html>
