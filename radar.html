<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIR // RADAR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width: 1920px;
    height: 440px;
    overflow: hidden;
    background: #000;
    font-family: 'Share Tech Mono', monospace;
  }
  #radar-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 24px;
    background: #000;
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 10;
    border-bottom: 1px solid #0f2a0f;
  }
  #radar-header .title { color: #00ff41; font-size: 11px; letter-spacing: 3px; }
  #radar-header .hint  { color: #334433; font-size: 10px; letter-spacing: 1px; margin-left: auto; }
  iframe {
    position: absolute;
    top: 24px; left: 0;
    width: 1920px;
    height: 416px;
    border: none;
  }
</style>
</head>
<body>
  <div id="radar-header">
    <span class="title">◈ MIR // RADAR · US NEXRAD COMPOSITE</span>
    <span class="hint">SPACE / → RETURN TO HUD</span>
  </div>

  <!--
    Windy embed — official embed API, allows iframes, animated radar
    Centered on Kalamazoo MI (42.29, -85.59), zoom 5 = US view
    overlay=radar shows NEXRAD composite loop
  -->
  <iframe
    src="https://embed.windy.com/embed2.html?lat=42.29&lon=-85.59&detailLat=42.29&detailLon=-85.59&width=1920&height=416&zoom=5&level=surface&overlay=radar&product=radar&menu=&message=&marker=&calendar=12&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1"
    allowfullscreen>
  </iframe>
</body>
</html>
